server {
    listen 80;
    server_name 148.230.70.161;

    # --- Ship observation CSVs ---
    # Accessible at: http://148.230.70.161/data/ships/<WMOID>.csv
    location /data/ships/ {
        alias /opt/arct-collector/data/processed/csv/ships/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type text/plain;
    }

    # --- SIMBA ice buoy CSVs ---
    location /data/simba/ {
        alias /opt/arct-collector/data/processed/csv/simba/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type text/plain;
    }

    # --- Thermistor chain buoy CSVs ---
    location /data/thermistor/ {
        alias /opt/arct-collector/data/processed/csv/thermistor/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type text/plain;
    }

    # --- ArctSum 2025 buoy CSVs ---
    location /data/arctsum/ {
        alias /opt/arct-collector/data/processed/csv/arctsum/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type text/plain;
    }

}
